# Open Brain Configuration
# Override any value with environment variables (uppercase, underscores)
# e.g., DB_HOST, OLLAMA_ENDPOINT, MCP_ACCESS_KEY

database:
  host: ${DB_HOST:-openbrain-postgres}
  port: ${DB_PORT:-5432}
  name: ${DB_NAME:-openbrain}
  user: ${DB_USER:-openbrain}
  password: ${DB_PASSWORD:-changeme}

embedder:
  # Provider: "ollama" (local, free) or "openrouter" (cloud, paid)
  provider: ${EMBEDDER_PROVIDER:-ollama}
  dimensions: ${EMBEDDING_DIMENSIONS:-768}

  # Ollama settings (when provider=ollama)
  ollama:
    endpoint: ${OLLAMA_ENDPOINT:-http://ollama-gpu-bridge:11434}
    embed_model: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
    llm_model: ${OLLAMA_LLM_MODEL:-llama3.2}

  # OpenRouter settings (when provider=openrouter)
  openrouter:
    api_key: ${OPENROUTER_API_KEY:-}
    embed_model: "openai/text-embedding-3-small"
    llm_model: "openai/gpt-4o-mini"

api:
  host: ${API_HOST:-0.0.0.0}
  port: ${API_PORT:-8000}

mcp:
  host: ${MCP_HOST:-0.0.0.0}
  port: ${MCP_PORT:-8080}
  access_key: ${MCP_ACCESS_KEY:-}

logging:
  level: ${LOG_LEVEL:-info}

# Metadata extraction prompt
metadata_prompt: |
  Extract metadata from the following thought. Return JSON with:
  - type: one of "observation", "task", "idea", "reference", "person_note", "decision", "meeting"
  - topics: array of 1-3 topic tags (lowercase, hyphenated)
  - people: array of people mentioned (proper names)
  - action_items: array of implied action items
  - dates: array of dates mentioned (YYYY-MM-DD format)
  Return ONLY valid JSON, no explanation.
